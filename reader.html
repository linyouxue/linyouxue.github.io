<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="AI Signal 站内阅读：结构化论文、公开网页与社交平台信号。">
  <link rel="icon" type="image/svg+xml" href="./assets/site-icon.svg">
  <title>AI Signal · 站内阅读</title>
  <style>
    :root{--ink:#18213d;--muted:#75809a;--accent:#6477ec;--purple:#8c66e7;--cyan:#3fa8cc;--panel:rgba(255,255,255,.78);--line:rgba(91,105,151,.13);--shadow:0 24px 70px rgba(56,69,113,.13)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;color:var(--ink);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:radial-gradient(circle at 8% 3%,#dce9ff 0,transparent 28%),radial-gradient(circle at 93% 25%,#e9ddff 0,transparent 31%),radial-gradient(circle at 56% 100%,#dcf7f5 0,transparent 29%),linear-gradient(135deg,#f8faff,#f1f2fb 48%,#faf8ff);overflow-x:hidden}.glass{border:1px solid rgba(255,255,255,.92);background:var(--panel);box-shadow:var(--shadow);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
    .topbar{position:sticky;top:12px;z-index:100;min-height:68px;margin:16px 28px 0;padding:8px 11px 8px 12px;display:grid;grid-template-columns:minmax(190px,1fr) auto minmax(190px,1fr);align-items:center;gap:18px;border:1px solid rgba(255,255,255,.92);border-radius:23px;background:rgba(247,249,255,.74);box-shadow:0 16px 48px rgba(61,76,126,.12);backdrop-filter:blur(24px)}.brand{justify-self:start;display:flex;align-items:center;gap:11px;color:inherit;text-decoration:none}.brand img{width:42px;height:42px;border:3px solid #fff;border-radius:14px;object-fit:cover;box-shadow:0 7px 18px rgba(61,73,123,.16)}.brand-copy{display:grid;line-height:1.15}.brand-copy strong{font-size:14px}.brand-copy small{margin-top:4px;color:#929bb2;font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase}.page-nav{display:flex;gap:5px;padding:4px;border-radius:17px;background:rgba(228,233,249,.72)}.page-link{position:relative;min-width:132px;height:46px;display:flex;align-items:center;justify-content:center;gap:9px;padding:0 17px;border-radius:13px;color:#68738f;text-decoration:none;font-size:13px;font-weight:850}.page-link svg{width:18px}.page-link.active{color:#5368df;background:#fff;box-shadow:0 7px 18px rgba(69,84,138,.12)}.page-link.active:after{content:"";position:absolute;left:22px;right:22px;bottom:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#667df1,#9a6ce9)}.nav-status{justify-self:end;padding-right:8px;color:#7e88a1;font-size:10px;font-weight:750}.nav-status i{display:inline-block;width:7px;height:7px;margin-right:8px;border-radius:50%;background:#55d49d;box-shadow:0 0 0 5px rgba(85,212,157,.12)}
    .shell{width:min(1280px,100%);margin:auto;padding:24px 28px 58px}.back{display:inline-flex;align-items:center;gap:8px;margin:2px 0 17px;color:#6572a0;text-decoration:none;font-size:11px;font-weight:850}.back:hover{color:#5367dc}.reader-hero{position:relative;padding:43px 46px;border-radius:30px;overflow:hidden}.reader-hero:before{content:"";position:absolute;width:430px;height:430px;right:-160px;top:-230px;border:1px solid rgba(100,120,220,.13);border-radius:50%;box-shadow:0 0 0 60px rgba(109,127,229,.035)}.eyebrow{position:relative;display:flex;flex-wrap:wrap;gap:8px}.badge{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:9px;color:#6574cc;background:#edf1ff;font-size:8px;font-weight:900;letter-spacing:.08em}.badge i{width:6px;height:6px;border-radius:50%;background:currentColor}.badge.verify{color:#2f9571;background:#e8f7f0}.badge.warn{color:#b27838;background:#fff3df}.reader-hero h1{position:relative;max-width:960px;margin:17px 0 14px;font-size:clamp(31px,4.5vw,57px);line-height:1.08;letter-spacing:-.055em}.hero-summary{position:relative;max-width:900px;margin:0;color:#66738d;font-size:14px;line-height:1.85}.hero-meta{position:relative;display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:22px;color:#8993aa;font-size:10px;font-weight:750}.hero-meta span{display:inline-flex;align-items:center;gap:7px}.hero-actions{position:relative;display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}.button{height:43px;display:inline-flex;align-items:center;gap:8px;padding:0 15px;border:1px solid rgba(98,115,204,.14);border-radius:12px;color:#596bd9;background:#eef1ff;text-decoration:none;font-size:10px;font-weight:900}.button.primary{border:0;color:#fff;background:linear-gradient(135deg,#6078ea,#8a63e5);box-shadow:0 11px 24px rgba(100,99,221,.23)}.button:hover{transform:translateY(-1px)}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px;margin-top:16px}.main{display:grid;gap:16px}.card{padding:28px;border-radius:25px}.card-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.card-head small{color:#7583b1;font-size:8px;font-weight:900;letter-spacing:.13em;text-transform:uppercase}.card-head h2{margin:5px 0 0;font-size:21px;letter-spacing:-.035em}.card-head span{color:#949daf;font-size:8px}.key-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.key{padding:16px;border:1px solid rgba(98,112,158,.1);border-radius:15px;background:rgba(248,249,253,.72);color:#68738c;font-size:10px;line-height:1.65}.key:before{content:"";display:block;width:20px;height:4px;margin-bottom:10px;border-radius:999px;background:linear-gradient(90deg,#6579eb,#9b6ce8)}.sections{display:grid;gap:20px}.reading-section+.reading-section{padding-top:20px;border-top:1px solid var(--line)}.reading-section h3{margin:0 0 10px;font-size:16px}.reading-section p{margin:0;color:#68748d;font-size:11px;line-height:1.9;white-space:pre-line}.reading-section p+p{margin-top:10px}.reading-section ul{margin:0;padding-left:19px;color:#68748d;font-size:11px;line-height:1.85}.reading-section li+li{margin-top:7px}.empty-copy{color:#8a94aa;font-size:11px;line-height:1.8}
    .pdf-card{padding:0;overflow:hidden}.pdf-toolbar{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:15px;border-bottom:1px solid var(--line)}.pdf-toolbar div{min-width:0}.pdf-toolbar strong{display:block;font-size:13px}.pdf-toolbar small{display:block;margin-top:4px;color:#9099ad;font-size:8px}.pdf-frame{width:100%;height:760px;display:block;border:0;background:#e9ecf5}.pdf-fallback{padding:38px;text-align:center;color:#7e89a4;font-size:11px}.pdf-fallback a{color:#5e70dc}
    .side{display:grid;align-content:start;gap:14px}.side-card{padding:21px;border-radius:22px}.side-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:15px}.side-title h3{margin:0;font-size:14px}.side-title span{color:#99a2b5;font-size:7px;font-weight:900;letter-spacing:.1em}.facts{display:grid;gap:11px}.fact{padding-bottom:11px;border-bottom:1px solid var(--line)}.fact:last-child{padding-bottom:0;border:0}.fact small{display:block;color:#99a2b3;font-size:7px;font-weight:850;text-transform:uppercase}.fact strong{display:block;margin-top:4px;color:#59647f;font-size:10px;line-height:1.55;word-break:break-word}.tags{display:flex;flex-wrap:wrap;gap:6px}.tags span{padding:6px 8px;border-radius:8px;color:#6877bd;background:#eef1fb;font-size:7px;font-weight:850}.rights{color:#79849d;background:rgba(255,255,255,.65)}.rights p{margin:0;font-size:9px;line-height:1.75}.rights a{display:inline-flex;margin-top:12px;color:#5d70dc;text-decoration:none;font-size:9px;font-weight:850}.source-card{color:#eef2ff;background:linear-gradient(145deg,#2c3858,#434d79)}.source-card .side-title h3{color:#fff}.source-card p{margin:0;color:rgba(238,242,255,.69);font-size:9px;line-height:1.75}.source-card .button{margin-top:14px;border-color:rgba(255,255,255,.11);color:#d5dcff;background:rgba(255,255,255,.08)}
    .loading{min-height:420px;display:grid;place-items:center;text-align:center}.loader{width:48px;height:48px;margin:auto;border:3px solid #e5e9f7;border-top-color:#6b7dec;border-radius:50%;animation:spin .9s linear infinite}.loading h2{margin:17px 0 6px}.loading p{margin:0;color:#8791a9;font-size:10px}.error{padding:70px 25px;text-align:center}.error h1{font-size:28px}.error p{color:#7e89a3}.error a{color:#5e70db}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:980px){.topbar{grid-template-columns:1fr auto}.nav-status{display:none}.layout{grid-template-columns:1fr}.side{grid-template-columns:repeat(2,1fr)}.pdf-frame{height:680px}}
    @media(max-width:720px){.topbar{top:7px;min-height:60px;margin:8px 9px 0;padding:6px;grid-template-columns:auto 1fr;gap:7px;border-radius:19px}.brand{gap:0}.brand img{width:40px;height:40px;border-radius:12px}.brand-copy{display:none}.page-nav{justify-self:stretch;display:grid;grid-template-columns:1fr 1fr;padding:3px;border-radius:14px}.page-link{min-width:0;height:42px;padding:0 8px;border-radius:11px;font-size:11px}.shell{padding:14px 9px 35px}.reader-hero{padding:31px 23px;border-radius:24px}.reader-hero h1{font-size:34px}.hero-summary{font-size:12px}.layout{margin-top:10px}.card{padding:22px 18px;border-radius:22px}.key-grid{grid-template-columns:1fr}.side{grid-template-columns:1fr}.pdf-toolbar{align-items:flex-start;flex-direction:column}.pdf-frame{height:72vh}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./index.html"><img src="./assets/lin-yuanjing.png" alt=""><span class="brand-copy"><strong>林元靖</strong><small>Digital Garden</small></span></a>
    <nav class="page-nav" aria-label="页面切换">
      <a class="page-link" href="./index.html"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m3 11 9-8 9 8"></path><path d="M5 10v10h14V10"></path></svg><span>个人主页</span></a>
      <a class="page-link active" href="./ai-news.html"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16v14H4z"></path><path d="M8 9h8M8 13h5"></path></svg><span>AI 情报</span></a>
    </nav>
    <span class="nav-status"><i></i> STRUCTURED READER</span>
  </header>

  <main class="shell" id="app">
    <a class="back" href="./ai-news.html">← 返回 AI 分类情报流</a>
    <section class="loading glass" id="loading"><div><div class="loader"></div><h2>正在整理阅读内容</h2><p>读取摘要、证据状态和开放论文缓存…</p></div></section>
  </main>

  <script>
    const app=document.querySelector('#app'),loading=document.querySelector('#loading');
    const escapeHTML=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const safeUrl=value=>{try{const url=new URL(value,location.href);return ['http:','https:'].includes(url.protocol)?url.href:'#'}catch{return '#'}};
    const dateLabel=value=>{const date=new Date(value);return Number.isNaN(date.getTime())?'日期未知':new Intl.DateTimeFormat('zh-CN',{dateStyle:'long'}).format(date)};
    const kindLabel=kind=>({paper:'开放论文',social:'社交原帖',article:'公开网页'}[kind]||'情报阅读');
    const categoryLabel=key=>({research:'会议论文',impact:'AI 跨界突破',frontier:'前沿实验室',china:'中国 AI',voices:'人物动态',bigtech:'大厂动向',startups:'学术创业',opensource:'开源生态',policy:'政策安全'}[key]||'AI 情报');
    const statusLabel=status=>({'open-pdf-cached':'开放 PDF 已缓存','pdf-link-only':'开放 PDF 原始链接','abstract-only':'论文摘要','public-page-excerpt':'公开网页摘要','indexed-summary':'公开索引摘要','summary-only':'来源摘要'}[status]||status||'来源摘要');
    function fallbackRecord(item){return {id:item.id,kind:item.content_kind||(item.category==='research'?'paper':'article'),title:item.title,source:item.source,source_url:item.url,published_at:item.published_at,authors:item.authors||[],venue:item.venue||'',tags:item.tags||[],verification:item.verification||'来源待核对',summary:item.summary||'',key_points:[item.summary||'请查看原始来源。'],sections:[{title:item.category==='research'?'摘要':'内容概览',body:item.summary||'暂无整理内容。'}],reading_minutes:1,rights_note:'本站保留结构化摘要；完整内容请查看原始来源。',pdf_url:item.pdf_url||'',pdf_local:item.cached_pdf||'',fetch_status:'summary-only'} }
    function sectionMarkup(section){const paragraphs=Array.isArray(section.paragraphs)?section.paragraphs:[],bullets=Array.isArray(section.bullets)?section.bullets:[];return `<section class="reading-section"><h3>${escapeHTML(section.title||'阅读笔记')}</h3>${section.body?`<p>${escapeHTML(section.body)}</p>`:''}${paragraphs.map(p=>`<p>${escapeHTML(p)}</p>`).join('')}${bullets.length?`<ul>${bullets.map(point=>`<li>${escapeHTML(point)}</li>`).join('')}</ul>`:''}</section>`}
    function render(item,record){
      const sourceUrl=safeUrl(record.resolved_url||record.source_url||item.url),pdf=record.pdf_local||record.pdf_url||item.cached_pdf||item.pdf_url||'',authors=(record.authors||item.authors||[]).join(' · '),points=(record.key_points||[]).filter(Boolean),sections=(record.sections||[]).filter(section=>section.body||(section.paragraphs||[]).length||(section.bullets||[]).length),verify=record.verification||item.verification||'来源待核对',warning=/待|索引|媒体|平台/.test(verify),tags=record.tags||item.tags||[];
      document.title=`${item.title} · AI Signal`;
      loading.remove();
      app.insertAdjacentHTML('beforeend',`
        <article class="reader-hero glass">
          <div class="eyebrow"><span class="badge"><i></i>${escapeHTML(categoryLabel(item.category))}</span><span class="badge"><i></i>${escapeHTML(kindLabel(record.kind))}</span><span class="badge ${warning?'warn':'verify'}"><i></i>${escapeHTML(verify)}</span></div>
          <h1>${escapeHTML(item.title)}</h1><p class="hero-summary">${escapeHTML(record.summary||item.summary)}</p>
          <div class="hero-meta"><span>${escapeHTML(record.source||item.source)}</span><span>${dateLabel(record.published_at||item.published_at)}</span>${authors?`<span>${escapeHTML(authors)}</span>`:''}${record.venue?`<span>${escapeHTML(record.venue)}</span>`:''}<span>约 ${Number(record.reading_minutes)||1} 分钟</span></div>
          <div class="hero-actions"><a class="button primary" href="#reading">开始阅读 ↓</a><a class="button" href="${sourceUrl}" target="_blank" rel="noreferrer">查看原始来源 ↗</a>${pdf?`<a class="button" href="${safeUrl(pdf)}" target="_blank" rel="noreferrer">打开完整 PDF ↗</a>`:''}</div>
        </article>
        <div class="layout"><div class="main" id="reading">
          <section class="card glass"><header class="card-head"><div><small>KEY TAKEAWAYS</small><h2>先读这几条</h2></div><span>${points.length} POINTS</span></header><div class="key-grid">${points.length?points.map(point=>`<div class="key">${escapeHTML(point)}</div>`).join(''):'<p class="empty-copy">暂无提炼要点，请查看原始来源。</p>'}</div></section>
          <article class="card glass"><header class="card-head"><div><small>STRUCTURED READING</small><h2>${record.kind==='paper'?'论文结构化阅读':'网页内容整理'}</h2></div><span>${escapeHTML(statusLabel(record.fetch_status))}</span></header><div class="sections">${sections.length?sections.map(sectionMarkup).join(''):'<p class="empty-copy">当前仅有摘要，后台下一轮会继续补充公开内容。</p>'}</div></article>
          ${pdf?`<section class="pdf-card glass"><div class="pdf-toolbar"><div><strong>完整论文 PDF</strong><small>${record.pdf_local?'已缓存开放获取版本':'使用论文原始公开地址'}</small></div><a class="button" href="${safeUrl(pdf)}" target="_blank" rel="noreferrer">新窗口打开 ↗</a></div><iframe class="pdf-frame" src="${safeUrl(pdf)}#view=FitH" title="${escapeHTML(item.title)} PDF"><div class="pdf-fallback">浏览器无法嵌入 PDF，<a href="${safeUrl(pdf)}">请点击打开</a>。</div></iframe></section>`:''}
        </div><aside class="side">
          <section class="side-card glass"><header class="side-title"><h3>来源信息</h3><span>SOURCE FACTS</span></header><div class="facts"><div class="fact"><small>发布者</small><strong>${escapeHTML(record.source||item.source)}</strong></div><div class="fact"><small>发布日期</small><strong>${dateLabel(record.published_at||item.published_at)}</strong></div>${record.venue?`<div class="fact"><small>会议 / 期刊</small><strong>${escapeHTML(record.venue)}</strong></div>`:''}<div class="fact"><small>采集状态</small><strong>${escapeHTML(statusLabel(record.fetch_status))}</strong></div></div></section>
          <section class="side-card glass"><header class="side-title"><h3>标签</h3><span>TOPICS</span></header><div class="tags">${tags.map(tag=>`<span>${escapeHTML(tag)}</span>`).join('')}</div></section>
          <section class="side-card glass rights"><header class="side-title"><h3>阅读与版权</h3><span>NOTICE</span></header><p>${escapeHTML(record.rights_note||'本站展示结构化摘要，完整内容请查看原始来源。')}</p><a href="${sourceUrl}" target="_blank" rel="noreferrer">回到原始来源 ↗</a></section>
          <section class="side-card source-card"><header class="side-title"><h3>证据状态</h3><span>VERIFICATION</span></header><p>${escapeHTML(verify)}。重要科研结论请结合论文、公开证明与同行评审进展判断。</p><a class="button" href="${sourceUrl}" target="_blank" rel="noreferrer">核对原文 ↗</a></section>
        </aside></div>`);
    }
    function renderError(message){loading.remove();app.insertAdjacentHTML('beforeend',`<section class="error glass"><h1>没有找到这条阅读记录</h1><p>${escapeHTML(message)}</p><a href="./ai-news.html">返回 AI 情报页</a></section>`)}
    async function load(){const id=new URLSearchParams(location.search).get('id');if(!id)return renderError('链接中缺少资讯 ID。');try{const stamp=Date.now(),responses=await Promise.all([fetch(`./data/ai-news.json?v=${stamp}`,{cache:'no-store'}),fetch(`./data/readers.json?v=${stamp}`,{cache:'no-store'}).catch(()=>null)]);if(!responses[0].ok)throw new Error(`快照 HTTP ${responses[0].status}`);const snapshot=await responses[0].json(),item=(snapshot.items||[]).find(entry=>entry.id===id);if(!item)return renderError('这条内容可能已被下一轮快照替换。');let records=[];if(responses[1]&&responses[1].ok){const readerData=await responses[1].json();records=readerData.records||[]}const record=records.find(entry=>entry.id===id)||fallbackRecord(item);render(item,record)}catch(error){renderError(error.message)}}
    load();
  </script>
</body>
</html>
